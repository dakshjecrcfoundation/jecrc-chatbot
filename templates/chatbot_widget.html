<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JECRC Chatbot Widget</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: transparent; 
        }

        /* ========== WIDGET CONTAINER ========== */
        .widget-container {
            width: 370px;
            height: 550px;
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background: #0f172a;
            border: 2px solid #1e293b;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }

        /* ========== HEADER ========== */
        .widget-header {
            background: linear-gradient(135deg, #1e40af, #7c3aed);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
        }
        .widget-header .avatar {
            width: 42px; height: 42px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem; color: white;
            flex-shrink: 0;
        }
        .widget-header .info { flex: 1; }
        .widget-header .info h4 { color: white; font-size: 0.95rem; }
        .widget-header .info .status {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 2px;
        }
        .widget-header .info .status-dot {
            width: 8px; height: 8px;
            background: #22c55e;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 2s infinite;
        }
        .widget-header .info .status span {
            color: rgba(255,255,255,0.7);
            font-size: 0.75rem;
        }
        .widget-header .header-actions button {
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            width: 32px; height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.8rem;
            transition: background 0.2s;
        }
        .widget-header .header-actions button:hover {
            background: rgba(255,255,255,0.3);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* ========== QUICK ACTIONS / SUGGESTIONS ========== */
        .quick-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 10px 16px;
            background: #0f172a;
            border-bottom: 1px solid #1e293b;
        }
        .quick-actions button {
            background: #1e293b;
            border: 1px solid #334155;
            color: #94a3b8;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.72rem;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .quick-actions button:hover {
            background: #334155;
            color: #e2e8f0;
            border-color: #3b82f6;
        }

        /* ========== MESSAGES AREA ========== */
        .widget-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background: #0f172a;
            scroll-behavior: smooth;
        }
        .widget-messages::-webkit-scrollbar { width: 4px; }
        .widget-messages::-webkit-scrollbar-track { background: transparent; }
        .widget-messages::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }

        /* ========== MESSAGE BUBBLES ========== */
        .w-msg {
            margin-bottom: 14px;
            display: flex;
            flex-direction: column;
            gap: 3px;
            animation: fadeInMsg 0.3s ease-out;
        }
        .w-msg.bot { align-items: flex-start; }
        .w-msg.user { align-items: flex-end; }

        @keyframes fadeInMsg {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .w-msg .bubble {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 0.85rem;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .w-msg.bot .bubble {
            background: #1e293b;
            color: #e2e8f0;
            border-bottom-left-radius: 4px;
        }
        .w-msg.user .bubble {
            background: linear-gradient(135deg, #3b82f6, #7c3aed);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .w-msg .msg-time {
            font-size: 0.65rem;
            color: #475569;
            padding: 0 4px;
        }

        /* ========== TYPING INDICATOR ========== */
        .typing-dots {
            display: flex;
            gap: 5px;
            padding: 4px 0;
            align-items: center;
        }
        .typing-dots .dot {
            width: 8px; height: 8px;
            background: #64748b;
            border-radius: 50%;
            display: inline-block;
            animation: dotPulse 1.4s infinite ease-in-out;
        }
        .typing-dots .dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotPulse {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* ========== ERROR MESSAGE ========== */
        .w-msg.bot .bubble.error-bubble {
            background: #2d1b1b;
            border: 1px solid #7f1d1d;
            color: #fca5a5;
        }

        /* ========== INPUT AREA ========== */
        .widget-input {
            display: flex;
            padding: 12px 16px;
            background: #1e293b;
            border-top: 1px solid #334155;
            gap: 8px;
            align-items: center;
        }
        .widget-input input {
            flex: 1;
            border: 1px solid #334155;
            background: #0f172a;
            color: #e2e8f0;
            padding: 10px 14px;
            border-radius: 24px;
            font-size: 0.85rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .widget-input input:focus { border-color: #3b82f6; }
        .widget-input input::placeholder { color: #64748b; }
        .widget-input input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .widget-input button {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, #3b82f6, #7c3aed);
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .widget-input button:hover { transform: scale(1.1); }
        .widget-input button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* ========== POWERED BY FOOTER ========== */
        .widget-footer {
            text-align: center;
            padding: 6px;
            background: #0f172a;
            border-top: 1px solid #1e293b;
        }
        .widget-footer span {
            font-size: 0.6rem;
            color: #475569;
        }
        .widget-footer a {
            color: #3b82f6;
            text-decoration: none;
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 400px) {
            .widget-container {
                width: 100%;
                height: 100vh;
                border-radius: 0;
                border: none;
            }
        }
    </style>
</head>
<body>

<div class="widget-container">
    <!-- ===== HEADER ===== -->
    <div class="widget-header">
        <div class="avatar"><i class="fas fa-robot"></i></div>
        <div class="info">
            <h4>JECRC Foundation Helpdesk</h4>
            <div class="status">
                <div class="status-dot"></div>
                <span>Online | Typically replies instantly</span>
            </div>
        </div>
        <div class="header-actions">
            <button onclick="clearChat()" title="Clear Chat">
                <i class="fas fa-rotate-right"></i>
            </button>
        </div>
    </div>

    <!-- ===== QUICK ACTIONS ===== -->
    <div class="quick-actions" id="quickActions">
        <button onclick="quickSend('Admission process kya hai?')">📋 Admission Info</button>
        <button onclick="quickSend('Courses available?')">📚 Courses</button>
        <button onclick="quickSend('Fee structure batao')">💰 Fee Structure</button>
        <button onclick="quickSend('Placement details')">🎯 Placements</button>
        <button onclick="quickSend('Campus facilities?')">🏛️ Campus</button>
    </div>

    <!-- ===== MESSAGES ===== -->
    <div class="widget-messages" id="widgetMessages">
        <div class="w-msg bot">
            <div class="bubble">Hello! 👋 I'm the JECRC Foundation AI Assistant. How can I help you today?

You can ask me about admissions, courses, fees, placements, campus life and more!</div>
            <span class="msg-time" id="welcomeTime"></span>
        </div>
    </div>

    <!-- ===== INPUT ===== -->
    <div class="widget-input">
        <input type="text" id="widgetInput" placeholder="Type your question..."
               onkeypress="if(event.key==='Enter')widgetSend()" autocomplete="off">
        <button id="sendBtn" onclick="widgetSend()"><i class="fas fa-paper-plane"></i></button>
    </div>

    <!-- ===== FOOTER ===== -->
    <div class="widget-footer">
        <span>Powered by <a href="#">JECRC AI</a> • Built with ❤️</span>
    </div>
</div>

<script>
    // ========== CONFIGURATION ==========
    const API_BASE = window.CHATBOT_API || '';  // Change if hosted elsewhere
    const SESSION_ID = 'widget-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);

    // ========== DOM ELEMENTS ==========
    const widgetMessages = document.getElementById('widgetMessages');
    const widgetInput = document.getElementById('widgetInput');
    const sendBtn = document.getElementById('sendBtn');
    const quickActions = document.getElementById('quickActions');

    // ========== STATE ==========
    let isSending = false;
    let messageCount = 0;

    // ========== SET WELCOME TIME ==========
    document.getElementById('welcomeTime').textContent = getTimeString();

    // ========== UTILITY FUNCTIONS ==========
    function getTimeString() {
        return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function setInputState(disabled) {
        widgetInput.disabled = disabled;
        sendBtn.disabled = disabled;
    }

    // ========== ADD MESSAGE ==========
    function addWidgetMsg(text, sender, isError = false) {
        const wrapper = document.createElement('div');
        wrapper.className = `w-msg ${sender}`;

        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        if (isError) bubble.classList.add('error-bubble');
        bubble.textContent = text;

        const time = document.createElement('span');
        time.className = 'msg-time';
        time.textContent = getTimeString();

        wrapper.appendChild(bubble);
        wrapper.appendChild(time);
        widgetMessages.appendChild(wrapper);
        widgetMessages.scrollTop = widgetMessages.scrollHeight;

        messageCount++;

        // Hide quick actions after first user message
        if (sender === 'user' && messageCount <= 2) {
            quickActions.style.display = 'none';
        }
    }

    // ========== TYPING INDICATOR ==========
    function showTyping() {
        const div = document.createElement('div');
        div.className = 'w-msg bot';
        div.id = 'typing-indicator';
        div.innerHTML = `
            <div class="bubble">
                <div class="typing-dots">
                    <span class="dot"></span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                </div>
            </div>
        `;
        widgetMessages.appendChild(div);
        widgetMessages.scrollTop = widgetMessages.scrollHeight;
    }

    function removeTyping() {
        const el = document.getElementById('typing-indicator');
        if (el) el.remove();
    }

    // ========== SEND MESSAGE ==========
    async function widgetSend() {
        const msg = widgetInput.value.trim();
        if (!msg || isSending) return;

        isSending = true;
        setInputState(true);

        addWidgetMsg(msg, 'user');
        widgetInput.value = '';
        showTyping();

        try {
            const res = await fetch(`${API_BASE}/api/chat`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    message: msg, 
                    session_id: SESSION_ID 
                })
            });

            if (!res.ok) {
                throw new Error(`Server responded with status ${res.status}`);
            }

            const data = await res.json();
            removeTyping();

            if (data.reply) {
                addWidgetMsg(data.reply, 'bot');
            } else {
                throw new Error('Empty response from server');
            }

        } catch (err) {
            console.error('Chat error:', err);
            removeTyping();
            addWidgetMsg('⚠️ Sorry, I\'m unable to connect right now. Please try again in a moment.', 'bot', true);
        } finally {
            isSending = false;
            setInputState(false);
            widgetInput.focus();
        }
    }

    // ========== QUICK SEND (Suggestion Buttons) ==========
    function quickSend(msg) {
        widgetInput.value = msg;
        widgetSend();
    }

    // ========== CLEAR CHAT ==========
    function clearChat() {
        widgetMessages.innerHTML = '';
        messageCount = 0;
        quickActions.style.display = 'flex';

        // Re-add welcome message
        const wrapper = document.createElement('div');
        wrapper.className = 'w-msg bot';
        wrapper.innerHTML = `
            <div class="bubble">Hello! 👋 Chat cleared! How can I help you today?</div>
            <span class="msg-time">${getTimeString()}</span>
        `;
        widgetMessages.appendChild(wrapper);
        widgetInput.focus();
    }

    // ========== AUTO FOCUS ==========
    window.addEventListener('load', () => {
        widgetInput.focus();
    });
</script>

</body>
</html>
